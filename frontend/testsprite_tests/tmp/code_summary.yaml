version: "2"
type: frontend
tech_stack:
  - HTML
  - CSS
  - JavaScript
  - Google Fonts
  - Calendly Widget
routes:
  - path: /
    file: index.html
    auth_required: false
    description: Main marketing page with hero, problem section, how it works, findings, comparison, trust, and CTA sections
  - path: /configuration
    file: index.html
    auth_required: false
    description: Configuration view for setting up RedFlag analysis parameters
  - path: /playground
    file: index.html
    auth_required: false
    description: Chat/playground interface for interacting with RedFlag AI
features:
  - name: Marketing Page Navigation
    description: Fixed navigation bar with logo, links to sections, and CTA button
    files:
      - index.html
    entry_route: /
    user_interactions:
      - Click logo to return to marketing page
      - Click nav links to scroll to sections or switch views
      - Click CTA button to access configuration
      - Mobile hamburger menu toggles mobile navigation
  - name: Hero Section with Typewriter
    description: Animated hero headline with typewriter effect showcasing RedFlag value proposition
    files:
      - index.html
    entry_route: /
    user_interactions:
      - View animated typewriter headline
      - Click primary CTA button
      - Click secondary button
      - View mock terminal output showing contradiction detection
  - name: Configuration Panel
    description: Form interface for configuring document analysis settings
    files:
      - index.html
    entry_route: /configuration
    user_interactions:
      - Select case type from dropdown
      - Enter case name and number
      - Configure analysis options
      - Click Save Configuration
      - Click Start Analysis
      - View configuration summary
  - name: Chat Playground
    description: Interactive chat interface for uploading documents and querying contradictions
    files:
      - index.html
    entry_route: /playground
    user_interactions:
      - Upload documents via dropzone or file picker
      - View uploaded file list
      - Type queries in chat input
      - Send messages and view AI responses
      - Create new chat sessions
      - Switch between chat sessions
      - Rename or delete sessions
      - Use quick question buttons
      - View citation badges in responses
      - Toggle compact view
  - name: Document Upload
    description: Drag-and-drop or click-to-upload interface for litigation documents
    files:
      - index.html
    entry_route: /playground
    user_interactions:
      - Drag files into dropzone
      - Click dropzone to open file picker
      - View list of uploaded files
      - Remove individual files
      - See file count and capacity indicator
  - name: Responsive Navigation
    description: Mobile-friendly navigation with hamburger menu
    files:
      - index.html
    entry_route: /
    user_interactions:
      - Resize window to trigger mobile view
      - Click hamburger to open mobile menu
      - Click links in mobile menu
      - Click outside or hamburger to close
known_limitations:
  - issue: Chat functionality is frontend-only, not connected to real AI backend
    location: index.html (playground-view)
    impact: Responses are simulated, not actual AI analysis
  - issue: Configuration save is client-side only
    location: index.html (configuration-view)
    impact: Settings not persisted to server
  - issue: Document upload does not send files to backend
    location: index.html (playground-view)
    impact: Files are only stored in browser memory
